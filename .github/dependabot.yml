version: 2

updates:
  # Backend dependencies
  - package-ecosystem: "npm"
    directory: "/server"

    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Kolkata"

    open-pull-requests-limit: 5

    labels:
      - "dependencies"

    commit-message:
      prefix: "chore"

    groups:
      backend-dependencies:
        patterns:
          - "*"

  # Frontend dependencies
  - package-ecosystem: "npm"
    directory: "/client"

    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "09:00"
      timezone: "Asia/Kolkata"

    open-pull-requests-limit: 5

    labels:
      - "dependencies"

    commit-message:
      prefix: "chore"

    groups:
      frontend-dependencies:
        patterns:
          - "*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"

    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "09:00"
      timezone: "Asia/Kolkata"

    open-pull-requests-limit: 5

    labels:
      - "dependencies"

    commit-message:
      prefix: "chore"

    groups:
      github-actions:
        patterns:
          - "*"