name: PR Auto Labeling

on:
    pull_request_target:
        types: [opened, synchronize, reopened]

permissions:
    contents: read
    issues: write
    pull-requests: write

jobs:
    label:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v7
              
            - name: Apply Labels
              uses: ./.github/actions/apply-label
              with:
                mode: pr
                github-token: ${{secrets.GITHUB_TOKEN}}