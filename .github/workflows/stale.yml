name: Stale

on:
  schedule:
    - cron: "0 2 * * *"

  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest

    steps:
      - name: Mark and Close Stale Issues
        uses: actions/stale@v10
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          days-before-issue-stale: 60
          days-before-issue-close: 7

          days-before-pr-stale: 90
          days-before-pr-close: 14

          stale-issue-label: stale
          stale-pr-label: stale

          exempt-issue-labels: dependencies,security
          exempt-pr-labels: dependencies,security

          stale-issue-message: >
            This issue has been automatically marked as stale because it has been inactive for 60 days.
            It will be closed in 7 days if there is no further activity.

          close-issue-message: >
            Closing this issue due to prolonged inactivity.

          stale-pr-message: >
            This pull request has been automatically marked as stale because it has been inactive for 90 days.
            It will be closed in 14 days if there is no further activity.

          close-pr-message: >
            Closing this pull request due to prolonged inactivity.